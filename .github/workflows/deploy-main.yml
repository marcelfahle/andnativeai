name: Deploy Main

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      DEPLOY_HOST: 91.99.49.152
      DEPLOY_USER: andnative-deploy
      DEPLOY_PATH: /opt/andnativeai

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install deploy SSH key
        run: |
          test -n "${{ secrets.HETZNER_DEPLOY_SSH_KEY }}"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.HETZNER_DEPLOY_SSH_KEY }}" > ~/.ssh/andnative_deploy
          chmod 600 ~/.ssh/andnative_deploy
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Sync application files
        run: |
          rsync -az --delete \
            --exclude .git \
            --exclude .DS_Store \
            --exclude .env \
            --exclude _build \
            --exclude deps \
            --exclude priv/static/assets \
            --exclude var \
            -e "ssh -i ~/.ssh/andnative_deploy -o StrictHostKeyChecking=yes" \
            ./ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"

      - name: Rebuild and restart Hetzner stack
        run: |
          ssh -i ~/.ssh/andnative_deploy -o StrictHostKeyChecking=yes "$DEPLOY_USER@$DEPLOY_HOST" <<'REMOTE'
          set -euo pipefail
          cd /opt/andnativeai/deploy
          if [ ! -f ../.env ]; then
            echo "/opt/andnativeai/.env is missing"
            exit 1
          fi

          set -a
          . ../.env
          set +a

          if ! grep -Eq '^SECRET_KEY_BASE=.{64,}$' ../.env || grep -Eq '^SECRET_KEY_BASE=replace-me' ../.env; then
            echo "SECRET_KEY_BASE is missing or still set to a placeholder in /opt/andnativeai/.env"
            exit 1
          fi

          if ! printf %s "${POSTGRES_PASSWORD:-}" | grep -Eq '^[A-Za-z0-9]{32,}$' || [ "$POSTGRES_PASSWORD" = "postgres" ]; then
            echo "POSTGRES_PASSWORD must be set to a non-default alphanumeric value with at least 32 characters in /opt/andnativeai/.env"
            exit 1
          fi

          if ! printf %s "${MINIO_ROOT_PASSWORD:-}" | grep -Eq '^[A-Za-z0-9]{32,}$' || [ "$MINIO_ROOT_PASSWORD" = "andnative-secret" ]; then
            echo "MINIO_ROOT_PASSWORD must be set to a non-default alphanumeric value with at least 32 characters in /opt/andnativeai/.env"
            exit 1
          fi

          docker compose --env-file ../.env -p andnativeai -f hetzner-demo.compose.yml up -d postgres redis minio
          docker compose --env-file ../.env -p andnativeai -f hetzner-demo.compose.yml exec -T \
            -e NEW_POSTGRES_PASSWORD="$POSTGRES_PASSWORD" \
            postgres sh -lc 'psql -U postgres -d postgres -v ON_ERROR_STOP=1 -c "ALTER USER postgres WITH PASSWORD '\''$NEW_POSTGRES_PASSWORD'\'';"'

          docker compose --env-file ../.env -p andnativeai -f hetzner-demo.compose.yml up -d --build
          docker compose --env-file ../.env -p andnativeai -f hetzner-demo.compose.yml up -d --force-recreate control-panel slack-listener
          docker compose --env-file ../.env -p andnativeai -f hetzner-demo.compose.yml ps
          REMOTE

      - name: Verify deployment
        run: |
          code="$(curl -sS -o /dev/null -w '%{http_code}' https://andnativeai.marcelfahle.net)"
          test "$code" = "401"

          ssh -i ~/.ssh/andnative_deploy -o StrictHostKeyChecking=yes "$DEPLOY_USER@$DEPLOY_HOST" <<'REMOTE'
          set -euo pipefail

          for path in /admin/control-plane /admin/slack /admin/agents; do
            for attempt in $(seq 1 30); do
              if docker exec andnative-control-panel curl -fsS -o /dev/null "http://localhost:4000${path}"; then
                break
              fi

              if [ "$attempt" = "30" ]; then
                echo "Timed out waiting for ${path}"
                exit 1
              fi

              sleep 2
            done
          done
          REMOTE
